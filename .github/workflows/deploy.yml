name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: bcsoccerclub
  CLOUDFRONT_DISTRIBUTION_ID: E2ROO7A769UCO2

jobs:
  deploy:
    if: ${{ vars.AWS_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Show GitHub OIDC claims
        run: |
          token_json=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")
          jwt=$(node -e "let data = ''; process.stdin.on('data', chunk => data += chunk).on('end', () => console.log(JSON.parse(data).value));" <<< "$token_json")
          node -e "const payload = JSON.parse(Buffer.from(process.argv[1].split('.')[1], 'base64url').toString()); console.log('aud=' + payload.aud); console.log('sub=' + payload.sub); console.log('repository=' + payload.repository); console.log('repository_owner=' + payload.repository_owner); console.log('ref=' + payload.ref);" "$jwt"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload dist to S3
        run: aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
